# ISO DIS DOCX style mapping — new template from ISO Typefi pipeline
#
# Template: data/iso-dis/template.docx (250 styles, ISO DIS reference)
# Reference: spec/fixtures/20250530-ISO_DIS_15926-100.docx
# Used for: DIS/FDIS stage documents (stages 40-60, 90)
# Triggered by: :iso-word-template => "dis" (or default for stages 40+)

paragraph_styles:
  # ── Document structure ──
  title: zzSTDTitle
  heading1: Heading1
  heading2: Heading2
  heading3: Heading3
  heading4: Heading4
  heading5: Heading5
  heading6: Heading6

  # ── Annex headings ──
  annex: ANNEX
  annex_heading2: a2
  annex_heading3: a3
  annex_heading4: a4
  annex_heading5: a5
  annex_heading6: a6

  # ── Preface sections ──
  foreword: ForewordTitle
  foreword_text: ForewordText
  introduction: IntroTitle
  bibliography: BiblioTitle
  index: IndexHead

  # ── Content blocks ──
  note: Note
  example: Example
  sourcecode: Code
  formula: Formula
  figure_title: Figuretitle
  figure_title_annex: AnnexFigureTitle
  table_title: Tabletitle
  table_title_annex: AnnexTableTitle
  admonition: Warningtext
  admonition_title: Warningtitle
  quote: Disp-quotep
  definition: Definition

  # ── Table styles ──
  table_header: Tableheader
  table_body: Tablebody
  table_footer: Tablefooter

  # ── Footnotes ──
  footnote_text: FootnoteText

  # ── TOC ──
  toc1: TOC1
  toc2: TOC2
  toc3: TOC3
  contents_title: zzContents

  # ── Terms ──
  term_num: TermNum
  terms: Terms
  admitted_term: AltTerms
  deprecated_term: DeprecatedTerms
  alt_terms: AltTerms

  # ── Source and key ──
  source: Source
  key_title: KeyTitle

  # ── Normative references ──
  normref: normref
  ref_norm: normref

  # ── Cover page ──
  cover_large: zzCoverlarge
  cover_meta: zzCover
  cover_title: CoverTitleA1
  cover_subtitle: CoverTitleA2

  # ── Copyright and colophon ──
  colophon: zzCopyright
  copyright: zzCopyright
  copyright_hdr: zzCopyright
  copyright_address: zzCopyrightaddress
  warning_header: zzwarninghdr
  warning: zzwarning

  # ── Middle title (repeated before body) ──
  main_title1: MainTitle1
  main_title2: MainTitle2

  # ── Variant titles ──
  variant_title_toc: variant-title-toc

  # ── Body text ──
  body_text: BodyText
  body_text_indent: BodyTextindent1

  # ── Bibliography entries ──
  biblio_entry: BiblioEntry
  biblio_text: BiblioText
  biblio_description: BiblioDescription

  # ── Lists ──
  list_continue1: ListContinue1
  list_paragraph: ListParagraph

  # ── Section breaks ──
  page_break: PAGEBREAK

  # ── Figure ──
  figure_graphic: FigureGraphic

  # ── Header/footer styles ──
  header_centered: HeaderCentered
  footer_centered: FooterCentered
  footer_page_number: FooterPageNumber
  footer_roman: FooterPageRomanNumber

  # ── Amendment content ──
  amend_newcontent: a3
  amend_heading: a2

character_styles:
  hyperlink: Hyperlink
  footnote_reference: FootnoteReference
  stem: stem
  inline_code: InlineCode
  endnote_reference: EndnoteReference

numbering:
  # From reference DOCX numbering.xml
  # abstractNumId=0: IntroHeading1..9 multilevel
  intro_clause: 8
  # abstractNumId=1: ListContinue1 dash bullets (hybridMultilevel)
  dash_list: 3
  # abstractNumId=3: Heading1..9 multilevel
  body_clause: 4
  # abstractNumId=4: decimal ordered list (1. 2. 3.)
  decimal_list: 1
  # abstractNumId=6: ANNEX + a2..a6 + Figure/Table numbering
  annex_clause: 7
  # abstractNumId=2: plain dash bullets (no style)
  plain_dash_list: 5
  # abstractNumId=5: plain dash bullets (variant)
  dash_list_variant: 6
